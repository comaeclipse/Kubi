<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
    <title>Offline — Kubi</title>
    <style>
      html, body {
        margin: 0;
        height: 100%;
        font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Arial, sans-serif;
        background: #ffffff;
        color: #18181b;
      }
      .wrap {
        height: 100%;
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        text-align: center;
        padding: 24px;
        gap: 12px;
      }
      .mark {
        width: 72px;
        height: 72px;
        border-radius: 16px;
        display: grid;
        place-items: center;
        color: #fff;
        font-weight: 700;
        font-size: 40px;
        background: linear-gradient(135deg, #7c3aed, #4f46e5);
      }
      h1 { font-size: 20px; margin: 8px 0 0; }
      p { color: #71717a; max-width: 22rem; margin: 0; }
      button {
        margin-top: 8px;
        border: 0;
        border-radius: 9999px;
        padding: 10px 20px;
        font-size: 15px;
        font-weight: 600;
        color: #fff;
        background: #4f46e5;
        cursor: pointer;
      }
      @media (prefers-color-scheme: dark) {
        html, body { background: #09090b; color: #fafafa; }
        p { color: #a1a1aa; }
      }
    </style>
  </head>
  <body>
    <div class="wrap">
      <div class="mark">K</div>
      <h1>You're offline</h1>
      <p>Kubi needs an internet connection to load videos. Check your connection and try again.</p>
      <button onclick="location.reload()">Retry</button>
    </div>
  </body>
</html>
